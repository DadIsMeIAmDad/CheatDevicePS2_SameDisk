name: Build PS2 CheatDevice

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull PS2DEV Docker image
        run: docker pull root670/ps2dev-docker

      - name: Build project using PS2DEV environment
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/build \
            root670/ps2dev-docker \
            make

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheatdevice-elf
          path: cheatdevice.elf
